backend:
  name: github
  repo: serbia70/rustblog
  branch: main
  base_url: https://rustblog-ivory.vercel.app
  auth_endpoint: /api/auth

publish_mode: editorial_workflow
media_folder: static/img
public_folder: /img

collections:
  - name: "misc"
    label: "杂谈"
    folder: "content/articles/misc"
    create: true
    path: "{{slug}}/index"
    format: "toml-frontmatter"
    media_folder: "../../../static/img/{{slug}}"
    public_folder: "/img/{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "发布日期", name: "date", widget: "datetime" }
      - { label: "更新日期", name: "updated", widget: "datetime", required: false }
      - { label: "描述", name: "description", widget: "string", required: false }
      - label: "分类和标签"
        name: "taxonomies"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - label: "标签"
            name: "tags"
            widget: "select"
            multiple: true
            options:
              - { label: "博客", value: "blog" }
              - { label: "必看", value: "featured" }
              - { label: "热门", value: "hot" }
              - { label: "项目", value: "project" }
              - { label: "作品", value: "works" }
              - { label: "技术", value: "tech" }
              - { label: "文档", value: "docs" }
            required: false
          - label: "分类"
            name: "categories"
            widget: "select"
            multiple: true
            options:
              - { label: "杂谈", value: "misc" }
              - { label: "主题", value: "theme" }
            required: false
      - { label: "置顶权重", name: "weight", widget: "number", required: false, value_type: "int" }
      - label: "封面和链接"
        name: "extra"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "封面图", name: "cover", widget: "string", required: false }
          - { label: "全局封面路径", name: "global_cover", widget: "string", required: false }
          - { label: "微信公众号链接", name: "wechat_url", widget: "string", required: false }
          - { label: "更新提示", name: "update_tip_enable", widget: "boolean", required: false, default: false }
      - { label: "正文", name: "body", widget: "markdown" }

  - name: "docs"
    label: "文档"
    folder: "content/articles/docs"
    create: true
    path: "{{slug}}/index"
    format: "toml-frontmatter"
    media_folder: "../../../static/img/{{slug}}"
    public_folder: "/img/{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "发布日期", name: "date", widget: "datetime" }
      - { label: "更新日期", name: "updated", widget: "datetime", required: false }
      - { label: "描述", name: "description", widget: "string", required: false }
      - label: "分类和标签"
        name: "taxonomies"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - label: "标签"
            name: "tags"
            widget: "select"
            multiple: true
            options:
              - { label: "博客", value: "blog" }
              - { label: "必看", value: "featured" }
              - { label: "热门", value: "hot" }
              - { label: "项目", value: "project" }
              - { label: "作品", value: "works" }
              - { label: "技术", value: "tech" }
              - { label: "文档", value: "docs" }
            required: false
          - label: "分类"
            name: "categories"
            widget: "select"
            multiple: true
            options:
              - { label: "杂谈", value: "misc" }
              - { label: "主题", value: "theme" }
            required: false
      - { label: "置顶权重", name: "weight", widget: "number", required: false, value_type: "int" }
      - label: "封面和链接"
        name: "extra"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "封面图", name: "cover", widget: "string", required: false }
          - { label: "全局封面路径", name: "global_cover", widget: "string", required: false }
          - { label: "更新提示", name: "update_tip_enable", widget: "boolean", required: false, default: false }
      - { label: "正文", name: "body", widget: "markdown" }

  - name: "pages"
    label: "页面"
    folder: "content/pages"
    create: true
    path: "{{slug}}/index"
    editor:
      preview: false
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "描述", name: "description", widget: "string", required: false }
      - { label: "正文", name: "body", widget: "markdown" }
